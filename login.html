<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | PatternLock-v4</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="logo">🔒</div>

        <h1>ログイン</h1>

        <p class="subtitle">
            パターンを入力してください
        </p>

        <div id="patternLock" class="pattern-lock">

            <svg id="patternCanvas"></svg>

            <div class="dot" data-id="1"></div>
            <div class="dot" data-id="2"></div>
            <div class="dot" data-id="3"></div>

            <div class="dot" data-id="4"></div>
            <div class="dot" data-id="5"></div>
            <div class="dot" data-id="6"></div>

            <div class="dot" data-id="7"></div>
            <div class="dot" data-id="8"></div>
            <div class="dot" data-id="9"></div>

        </div>

        <p id="message" class="message"></p>

        <button id="loginButton" class="btn primary">
            ログイン
        </button>

        <button id="resetButton" class="btn secondary">
            リセット
        </button>

        <a href="index.html" class="back">
            ← トップページへ戻る
        </a>

    </div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- JavaScript -->
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/pattern.js"></script>

</body>
</html>
