<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>パターン変更</title>

<link rel="stylesheet" href="css/login.css">

</head>
<body>

<div class="login-container">

    <div class="login-card">

        <div class="logo">🔑</div>

        <h1>パターン変更</h1>

        <p class="subtitle">
            新しいパターンを入力してください
        </p>

        <div id="patternLock" class="pattern-lock">

            <svg id="patternCanvas"></svg>

            <div class="dot" data-id="1"></div>
            <div class="dot" data-id="2"></div>
            <div class="dot" data-id="3"></div>

            <div class="dot" data-id="4"></div>
            <div class="dot" data-id="5"></div>
            <div class="dot" data-id="6"></div>

            <div class="dot" data-id="7"></div>
            <div class="dot" data-id="8"></div>
            <div class="dot" data-id="9"></div>

        </div>

        <p id="message" class="message"></p>

        <button id="saveButton" class="btn primary">
            保存
        </button>

        <button id="resetButton" class="btn secondary">
            リセット
        </button>

        <a href="admin.html" class="back">
            ← 管理者ページへ戻る
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/pattern.js"></script>
<script src="js/change-pattern.js"></script>

</body>
</html>
